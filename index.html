<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>MakerAI - Bio Scanner v5.0 - Precisão Cirúrgica</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #07080c;
            --bg-card: rgba(17, 18, 26, 0.95);
            --primary-neon: #00D1FF;
            --secondary-neon: #9C27B0;
            --tertiary-neon: #FF0066;
            --success-neon: #00FF88;
            --text-main: #F0F4FF;
            --text-muted: #8899A6;
            --border: rgba(255, 255, 255, 0.08);
            --font-tech: 'Orbitron', sans-serif;
            --neon-glow: 0 0 15px rgba(0, 209, 255, 0.4);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-dark);
            background-image: radial-gradient(circle at center, rgba(16, 20, 30, 0.5) 0%, #07080c 100%);
            color: var(--text-main);
            font-family: var(--font-tech);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            letter-spacing: 1px;
            padding: 1rem;
        }

        .bio-container {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 1.5rem;
            width: 100%;
            max-width: 500px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            position: relative;
        }

        .bio-container::before, .bio-container::after {
            content: '';
            position: absolute;
            width: 30px; height: 30px;
            border: 3px solid var(--primary-neon);
            z-index: 10;
        }
        .bio-container::before { top: -5px; left: -5px; border-right: none; border-bottom: none; }
        .bio-container::after { bottom: -5px; right: -5px; border-left: none; border-top: none; }

        h1 { font-size: 1.4rem; margin-bottom: 0.5rem; text-shadow: var(--neon-glow); }
        h1 span { background: linear-gradient(135deg, var(--primary-neon), var(--secondary-neon)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .subtitle { font-size: 0.7rem; color: var(--text-muted); margin-bottom: 1.5rem; }

        .visor-frame {
            position: relative;
            width: 100%;
            height: 380px;
            background: #000;
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid rgba(0, 209, 255, 0.3);
            margin-bottom: 1rem;
        }

        video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
        }

        .scan-laser {
            position: absolute;
            width: 100%;
            height: 2px;
            background: var(--primary-neon);
            box-shadow: 0 0 8px var(--primary-neon);
            top: 0;
            display: none;
            animation: laserMove 2s infinite;
            z-index: 15;
        }

        @keyframes laserMove {
            0% { top: -5%; opacity: 0; }
            20% { opacity: 1; }
            80% { opacity: 1; }
            100% { top: 105%; opacity: 0; }
        }

        .focus-reticle {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 220px;
            height: 280px;
            border: 1.5px dashed rgba(0, 209, 255, 0.6);
            border-radius: 50%;
            z-index: 8;
            pointer-events: none;
            display: none;
            animation: pulseReticle 1.5s infinite;
        }

        @keyframes pulseReticle {
            0%, 100% { border-color: rgba(0, 209, 255, 0.4); box-shadow: 0 0 5px rgba(0, 209, 255, 0.2); }
            50% { border-color: rgba(0, 209, 255, 1); box-shadow: 0 0 15px rgba(0, 209, 255, 0.5); }
        }

        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(8px);
            z-index: 20;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            border-radius: 16px;
        }

        .loading-overlay.hidden { display: none; }
        .loader {
            width: 50px;
            height: 50px;
            border: 2px solid rgba(0, 209, 255, 0.2);
            border-top: 2px solid var(--primary-neon);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 1rem;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-text { font-size: 0.7rem; color: var(--primary-neon); }
        .loading-progress { width: 70%; height: 2px; background: rgba(0, 209, 255, 0.2); margin-top: 0.8rem; border-radius: 2px; overflow: hidden; }
        .loading-progress-bar { width: 0%; height: 100%; background: var(--primary-neon); transition: width 0.3s; }

        .btn-maker {
            background: rgba(0, 209, 255, 0.1);
            color: var(--primary-neon);
            border: 1.5px solid var(--primary-neon);
            padding: 0.9rem;
            border-radius: 50px;
            cursor: pointer;
            font-family: var(--font-tech);
            font-weight: 700;
            font-size: 0.8rem;
            letter-spacing: 2px;
            transition: all 0.3s;
            width: 100%;
            margin-top: 1rem;
        }
        .btn-maker:hover { background: rgba(0, 209, 255, 0.3); box-shadow: 0 0 20px rgba(0, 209, 255, 0.4); transform: translateY(-2px); }
        .btn-maker:disabled { opacity: 0.5; cursor: not-allowed; }

        #status-hud { margin-top: 1rem; font-size: 0.65rem; color: var(--text-muted); min-height: 35px; }
        #result-display { display: none; margin-top: 1rem; padding-top: 1rem; border-top: 1px solid var(--border); }
        .diagnosis { font-size: 0.85rem; margin-bottom: 1rem; line-height: 1.8; text-align: left; }
        .highlight { color: var(--secondary-neon); font-weight: bold; }
        .confidence-badge { font-size: 0.7rem; color: var(--primary-neon); margin-top: 0.5rem; }

        .scan-progress {
            margin-top: 0.5rem;
            font-size: 0.65rem;
            color: var(--primary-neon);
            display: none;
        }
        .scan-progress.active { display: block; }
        .connection-progress {
            width: 100%;
            height: 2px;
            background: rgba(0, 209, 255, 0.2);
            border-radius: 2px;
            overflow: hidden;
            margin-top: 0.5rem;
        }
        .connection-bar {
            height: 100%;
            background: var(--primary-neon);
            width: 0%;
            transition: width 0.3s;
        }

        .analysis-status {
            margin-top: 0.5rem;
            font-size: 0.65rem;
            color: var(--success-neon);
            display: none;
        }
        .analysis-status.active { display: block; }
        
        .metricas-container {
            margin-top: 0.8rem;
            padding: 0.8rem;
            background: rgba(0, 209, 255, 0.05);
            border-radius: 12px;
            font-size: 0.7rem;
            text-align: left;
            border-left: 2px solid var(--primary-neon);
        }
    </style>
</head>
<body>
    <div class="bio-container">
        <h1><span>MAKER</span>AI</h1>
        <p class="subtitle">BIO SCANNER v5.0 - ANÁLISE DE PRECISÃO</p>
        
        <div class="visor-frame">
            <video id="video" autoplay muted playsinline></video>
            <canvas id="canvas"></canvas>
            <div id="laser" class="scan-laser"></div>
            <div id="reticle" class="focus-reticle"></div>
            
            <div id="loadingOverlay" class="loading-overlay">
                <div class="loader"></div>
                <div id="loadingText" class="loading-text">INICIALIZANDO IA...</div>
                <div class="loading-progress">
                    <div id="loadingProgress" class="loading-progress-bar"></div>
                </div>
            </div>
        </div>

        <div class="scan-progress" id="scanProgress">
            <span>📡 Conexões: <span id="connectionCount">0</span>/<span id="totalConnections">0</span></span>
            <div class="connection-progress">
                <div class="connection-bar" id="connectionBar"></div>
            </div>
        </div>

        <div class="analysis-status" id="analysisStatus">
            <span>🧬 Analisando: <span id="currentShapeDetected">...</span></span>
        </div>

        <button id="actionBtn" class="btn-maker" disabled>CARREGANDO...</button>
        
        <div id="status-hud">Aguardando inicialização...</div>
        
        <div id="result-display">
            <div class="diagnosis" id="formato-text"></div>
            <div class="metricas-container" id="metricas-text"></div>
            <div class="confidence-badge" id="confianca-text"></div>
            <button onclick="irParaAnalise()" class="btn-maker">VER RECOMENDAÇÕES</button>
        </div>
    </div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const actionBtn = document.getElementById('actionBtn');
        const laser = document.getElementById('laser');
        const reticle = document.getElementById('reticle');
        const statusDiv = document.getElementById('status-hud');
        const resultDisplay = document.getElementById('result-display');
        const loadingOverlay = document.getElementById('loadingOverlay');
        const loadingText = document.getElementById('loadingText');
        const loadingProgress = document.getElementById('loadingProgress');
        const scanProgress = document.getElementById('scanProgress');
        const connectionCountSpan = document.getElementById('connectionCount');
        const totalConnectionsSpan = document.getElementById('totalConnections');
        const analysisStatus = document.getElementById('analysisStatus');
        const currentShapeSpan = document.getElementById('currentShapeDetected');
        const connectionBar = document.getElementById('connectionBar');
        
        let faceShape = "Indeterminado";
        let confidence = 0;
        let stream = null;
        let scanning = false;
        let animationId = null;
        let currentDetection = null;
        let currentConnectionIndex = 0;
        let isAnimatingConnections = false;
        let shapeCounts = {};
        
        // Métricas detalhadas
        let metricas = {
            larguraRosto: 0,
            alturaRosto: 0,
            proporcao: 0,
            larguraTesta: 0,
            larguraMandibula: 0,
            alturaQueixo: 0,
            distanciaOlhos: 0,
            proporcaoTercoSuperior: 0,
            proporcaoTercoMedio: 0,
            proporcaoTercoInferior: 0
        };
        
        // Dimensões do canvas
        let canvasWidth = 0;
        let canvasHeight = 0;

        // Mapeamento de DETALHES INTERNOS (68 pontos face-api)
        const internalConnections = [
            // Sobrancelhas
            [17,18],[18,19],[19,20],[20,21],
            [22,23],[23,24],[24,25],[25,26],
            // Nariz
            [27,28],[28,29],[29,30],[30,31],[31,32],[32,33],[33,34],[34,35],[27,31],[31,35],
            // Olho esquerdo
            [36,37],[37,38],[38,39],[39,40],[40,41],[41,36],
            // Olho direito
            [42,43],[43,44],[44,45],[45,46],[46,47],[47,42],
            // Boca externa
            [48,49],[49,50],[50,51],[51,52],[52,53],[53,54],[54,55],[55,56],[56,57],[57,58],[58,59],[59,48],
            // Boca interna
            [60,61],[61,62],[62,63],[63,64],[64,65],[65,66],[66,67],[67,60]
        ];

        // ========== FUNÇÃO DEFINITIVA - TESTA COM FORMATO DE ELIPSE PERFEITA ==========
        function getUpperContourPoints(landmarks) {
            const pos = landmarks.positions;
            
            const leftJaw = pos[0];
            const rightJaw = pos[16];
            const leftBrow = pos[19];
            const rightBrow = pos[24];
            
            const centerBrowX = (leftBrow.x + rightBrow.x) / 2;
            const centerBrowY = (leftBrow.y + rightBrow.y) / 2;
            
            const jawWidth = Math.abs(rightJaw.x - leftJaw.x);
            const foreheadLeftX = leftJaw.x;
            const foreheadRightX = rightJaw.x;
            const foreheadHeight = jawWidth * 0.65;
            const topY = centerBrowY - foreheadHeight;
            const centerX = (foreheadLeftX + foreheadRightX) / 2;
            
            const points = [];
            const numPoints = 32;
            
            for (let i = 0; i <= numPoints; i++) {
                const t = i / numPoints;
                const x = foreheadLeftX + (foreheadRightX - foreheadLeftX) * t;
                
                const halfWidth = (foreheadRightX - foreheadLeftX) / 2;
                const dx = (x - centerX) / halfWidth;
                const clampedDx = Math.min(0.999, Math.max(-0.999, dx));
                const ellipseFactor = Math.sqrt(1 - clampedDx * clampedDx);
                
                const edgeY = centerBrowY - (foreheadHeight * 0.15);
                const centerY = topY;
                const y = edgeY * (1 - ellipseFactor) + centerY * ellipseFactor;
                
                points.push({ x, y });
            }
            
            return points;
        }

        // ========== FUNÇÕES DE ANÁLISE CIENTÍFICA ==========
        
        // Calcula distância euclidiana entre dois pontos
        function distancia(p1, p2) {
            return Math.sqrt(Math.pow(p2.x - p1.x, 2) + Math.pow(p2.y - p1.y, 2));
        }
        
        // Análise completa das proporções faciais [citation:2][citation:4]
        function analiseProporcoesCompletas(landmarks) {
            const pos = landmarks.positions;
            const upperPoints = getUpperContourPoints(landmarks);
            
            // Pontos principais
            const leftCheek = pos[0];
            const rightCheek = pos[16];
            const chin = pos[8];
            const nasion = pos[27]; // Raiz do nariz
            const noseTip = pos[33];
            const leftEye = pos[36];
            const rightEye = pos[45];
            const leftBrow = pos[19];
            const rightBrow = pos[24];
            const leftMouth = pos[48];
            const rightMouth = pos[54];
            
            // Topo da testa (ponto mais alto)
            const topForehead = upperPoints[Math.floor(upperPoints.length/2)];
            
            // 1. Largura e altura do rosto
            const larguraRosto = distancia(leftCheek, rightCheek);
            const alturaRosto = distancia(topForehead, chin);
            const proporcao = larguraRosto / alturaRosto;
            
            // 2. Largura da testa (nas têmporas)
            const leftTemple = upperPoints[5];
            const rightTemple = upperPoints[upperPoints.length - 6];
            const larguraTesta = distancia(leftTemple, rightTemple);
            
            // 3. Largura da mandíbula (entre os gônios - pontos 3 e 13)
            const leftGonion = pos[3];
            const rightGonion = pos[13];
            const larguraMandibula = distancia(leftGonion, rightGonion);
            
            // 4. Altura do queixo (do lábio inferior ao queixo)
            const lowerLip = pos[57];
            const alturaQueixo = distancia(lowerLip, chin);
            
            // 5. Distância entre olhos
            const distanciaOlhos = distancia(leftEye, rightEye);
            
            // 6. Três terços da face [citation:2]
            const alturaSuperior = distancia(topForehead, nasion);
            const alturaMedio = distancia(nasion, noseTip);
            const alturaInferior = distancia(noseTip, chin);
            const totalAltura = alturaSuperior + alturaMedio + alturaInferior;
            
            const proporcaoSuperior = alturaSuperior / totalAltura;
            const proporcaoMedio = alturaMedio / totalAltura;
            const proporcaoInferior = alturaInferior / totalAltura;
            
            // Valores ideais de referência (terços iguais ~0.333 cada)
            const idealTerco = 0.333;
            
            return {
                larguraRosto,
                alturaRosto,
                proporcao,
                larguraTesta,
                larguraMandibula,
                alturaQueixo,
                distanciaOlhos,
                proporcaoSuperior,
                proporcaoMedio,
                proporcaoInferior,
                idealTerco
            };
        }
        
        // Diagnóstico do formato do rosto baseado em múltiplos fatores [citation:2][citation:4]
        function diagnosticoFormatoRosto(proporcoes) {
            const { proporcao, larguraTesta, larguraMandibula, proporcaoSuperior, proporcaoMedio, proporcaoInferior } = proporcoes;
            
            // Relação testa/mandíbula para diferenciar formatos
            const relacaoTestaMandibula = larguraTesta / larguraMandibula;
            
            // Análise dos terços para diagnósticos adicionais
            const superiorMaior = proporcaoSuperior > 0.36;
            const medioMaior = proporcaoMedio > 0.36;
            const inferiorMaior = proporcaoInferior > 0.36;
            
            let formato = "Oval";
            let justificativa = "";
            
            // Lógica de classificação científica baseada em proporções [citation:2]
            if (proporcao > 0.95) {
                // Rosto mais largo que alto
                if (relacaoTestaMandibula > 1.05) {
                    formato = "Redondo";
                    justificativa = "Largura facial próxima à altura, com testa mais larga que a mandíbula";
                } else {
                    formato = "Quadrado";
                    justificativa = "Largura e altura equilibradas, com mandíbula angular";
                }
            } 
            else if (proporcao < 0.78) {
                // Rosto mais alto que largo
                if (relacaoTestaMandibula > 1.08) {
                    formato = "Coração (Invertido)";
                    justificativa = "Testa larga que afina em direção ao queixo pontudo";
                } else if (larguraMandibula < larguraTesta * 0.85) {
                    formato = "Coração";
                    justificativa = "Testa mais larga que a mandíbula, formato que afina suavemente";
                } else {
                    formato = "Longo";
                    justificativa = "Altura facial significativamente maior que a largura";
                }
            }
            else {
                // Proporção intermediária (0.78 - 0.95)
                if (larguraTesta > larguraMandibula * 1.1) {
                    formato = "Coração";
                    justificativa = "Testa proporcionalmente mais larga que a mandíbula";
                } else if (larguraMandibula > larguraTesta * 1.05) {
                    formato = "Triangular";
                    justificativa = "Mandíbula mais larga que a testa";
                } else {
                    formato = "Oval";
                    justificativa = "Proporções equilibradas com contorno suave";
                }
            }
            
            // Refinamento baseado nos terços faciais
            if (superiorMaior && !medioMaior && !inferiorMaior) {
                justificativa += " | Terço superior mais desenvolvido";
            } else if (!superiorMaior && medioMaior && !inferiorMaior) {
                justificativa += " | Terço médio mais desenvolvido";
            } else if (!superiorMaior && !medioMaior && inferiorMaior) {
                justificativa += " | Terço inferior mais desenvolvido";
            }
            
            return { formato, justificativa };
        }
        
        // Análise da entrada capilar [citation:2]
        function analiseEntradaCapilar(landmarks) {
            const pos = landmarks.positions;
            const upperPoints = getUpperContourPoints(landmarks);
            
            const leftTemple = upperPoints[4];
            const rightTemple = upperPoints[upperPoints.length - 5];
            const leftBrow = pos[19];
            const rightBrow = pos[24];
            
            const leftDistancia = leftBrow.y - leftTemple.y;
            const rightDistancia = rightBrow.y - rightTemple.y;
            const media = (leftDistancia + rightDistancia) / 2;
            
            if (media > 35) return "Entrada avançada (M-shaped)";
            if (media > 25) return "Entrada moderada";
            if (media > 15) return "Entrada leve";
            return "Normal (linha suave)";
        }
        
        // Classificação da altura da testa [citation:2]
        function classificacaoTesta(proporcoes) {
            const { proporcaoSuperior, idealTerco } = proporcoes;
            const diferenca = (proporcaoSuperior - idealTerco) * 100;
            
            if (diferenca > 5) return "Alta (proeminente)";
            if (diferenca < -5) return "Baixa (recuada)";
            return "Proporcional (ideal)";
        }

        async function carregarModelos() {
            loadingOverlay.classList.remove('hidden');
            const MODEL_URL = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model/';
            try {
                loadingProgress.style.width = '20%';
                await faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL);
                loadingProgress.style.width = '60%';
                await faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL);
                loadingProgress.style.width = '100%';
                loadingOverlay.classList.add('hidden');
                iniciarCamera();
            } catch (err) {
                statusDiv.innerHTML = "❌ Erro ao carregar IA";
                console.error(err);
            }
        }

        async function iniciarCamera() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                video.srcObject = stream;
                video.onloadedmetadata = () => {
                    const rect = video.getBoundingClientRect();
                    canvasWidth = rect.width;
                    canvasHeight = rect.height;
                    canvas.width = canvasWidth;
                    canvas.height = canvasHeight;
                    
                    statusDiv.innerHTML = "✅ Sistema pronto. Clique em 'INICIAR ESCANEAMENTO'";
                    actionBtn.disabled = false;
                    actionBtn.textContent = "INICIAR ESCANEAMENTO";
                    drawRealTime();
                };
            } catch (err) {
                statusDiv.innerHTML = "❌ Câmera não detectada";
                console.error(err);
            }
        }

        async function drawRealTime() {
            if (!video.videoWidth || !video.videoHeight) {
                animationId = requestAnimationFrame(drawRealTime);
                return;
            }
            
            if (canvas.width !== video.clientWidth || canvas.height !== video.clientHeight) {
                canvas.width = video.clientWidth;
                canvas.height = video.clientHeight;
                canvasWidth = canvas.width;
                canvasHeight = canvas.height;
            }
            
            const detection = await faceapi.detectSingleFace(video, new faceapi.TinyFaceDetectorOptions()).withFaceLandmarks();
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (detection) {
                const resized = faceapi.resizeResults(detection, { width: canvas.width, height: canvas.height });
                currentDetection = resized;
                
                if (isAnimatingConnections) {
                    drawSequentialMesh(resized.landmarks);
                } else if (!scanning) {
                    drawFullMesh(resized.landmarks);
                }
            }
            animationId = requestAnimationFrame(drawRealTime);
        }

        // ========== MALHA ULTRAPRECISA COM LINHAS FINAS ==========
        function drawFullMesh(landmarks) {
            const pos = landmarks.positions;
            const upperContour = getUpperContourPoints(landmarks);
            
            ctx.save();
            
            // Contorno externo - linha ultrafina
            ctx.strokeStyle = '#00D1FF';
            ctx.lineWidth = 0.8;
            ctx.shadowBlur = 0;
            ctx.beginPath();
            
            ctx.moveTo(pos[8].x, pos[8].y);
            
            // Sobe pelo lado esquerdo
            for (let i = 8; i >= 0; i--) {
                ctx.lineTo(pos[i].x, pos[i].y);
            }
            
            // Contorno da testa
            for (let i = 0; i < upperContour.length; i++) {
                ctx.lineTo(upperContour[i].x, upperContour[i].y);
            }
            
            // Desce pelo lado direito
            for (let i = 16; i >= 8; i--) {
                ctx.lineTo(pos[i].x, pos[i].y);
            }
            
            ctx.closePath();
            ctx.stroke();
            
            // Detalhes internos - linha mais fina ainda
            ctx.beginPath();
            ctx.lineWidth = 0.5;
            internalConnections.forEach(([s, e]) => {
                if(pos[s] && pos[e]) {
                    ctx.moveTo(pos[s].x, pos[s].y);
                    ctx.lineTo(pos[e].x, pos[e].y);
                }
            });
            ctx.stroke();
            
            // Pontos de referência - mínimos
            pos.forEach(p => {
                ctx.beginPath();
                ctx.arc(p.x, p.y, 0.8, 0, 2 * Math.PI);
                ctx.fillStyle = '#00D1FF';
                ctx.fill();
            });
            
            // Pontos do contorno da testa
            upperContour.forEach(p => {
                ctx.beginPath();
                ctx.arc(p.x, p.y, 0.6, 0, 2 * Math.PI);
                ctx.fillStyle = '#00D1FF';
                ctx.fill();
            });
            
            ctx.restore();
        }

        function drawSequentialMesh(landmarks) {
            const pos = landmarks.positions;
            const upperContour = getUpperContourPoints(landmarks);
            
            const leftJawSteps = 9;
            const rightJawSteps = 9;
            const totalSteps = leftJawSteps + upperContour.length + rightJawSteps + internalConnections.length;
            const progress = currentConnectionIndex / totalSteps;
            
            ctx.save();
            ctx.strokeStyle = '#00D1FF';
            
            if (currentConnectionIndex < leftJawSteps) {
                ctx.lineWidth = 0.8;
                ctx.beginPath();
                ctx.moveTo(pos[8].x, pos[8].y);
                for (let i = 8; i > 8 - Math.min(currentConnectionIndex, leftJawSteps - 1); i--) {
                    ctx.lineTo(pos[i].x, pos[i].y);
                }
                ctx.stroke();
            }
            else if (currentConnectionIndex < leftJawSteps + upperContour.length) {
                ctx.lineWidth = 0.8;
                ctx.beginPath();
                ctx.moveTo(pos[8].x, pos[8].y);
                for (let i = 8; i >= 0; i--) ctx.lineTo(pos[i].x, pos[i].y);
                
                const topStep = currentConnectionIndex - leftJawSteps;
                for (let i = 0; i < Math.min(topStep, upperContour.length); i++) {
                    ctx.lineTo(upperContour[i].x, upperContour[i].y);
                }
                ctx.stroke();
            }
            else if (currentConnectionIndex < leftJawSteps + upperContour.length + rightJawSteps) {
                ctx.lineWidth = 0.8;
                ctx.beginPath();
                ctx.moveTo(pos[8].x, pos[8].y);
                for (let i = 8; i >= 0; i--) ctx.lineTo(pos[i].x, pos[i].y);
                for (let i = 0; i < upperContour.length; i++) {
                    ctx.lineTo(upperContour[i].x, upperContour[i].y);
                }
                
                const rightStep = currentConnectionIndex - leftJawSteps - upperContour.length;
                for (let i = 16; i > 16 - Math.min(rightStep, rightJawSteps - 1); i--) {
                    ctx.lineTo(pos[i].x, pos[i].y);
                }
                ctx.stroke();
            }
            else {
                ctx.lineWidth = 0.8;
                ctx.beginPath();
                ctx.moveTo(pos[8].x, pos[8].y);
                for (let i = 8; i >= 0; i--) ctx.lineTo(pos[i].x, pos[i].y);
                for (let i = 0; i < upperContour.length; i++) {
                    ctx.lineTo(upperContour[i].x, upperContour[i].y);
                }
                for (let i = 16; i >= 8; i--) ctx.lineTo(pos[i].x, pos[i].y);
                ctx.closePath();
                ctx.stroke();
                
                const internalStep = currentConnectionIndex - leftJawSteps - upperContour.length - rightJawSteps;
                ctx.lineWidth = 0.5;
                ctx.beginPath();
                for (let i = 0; i < Math.min(internalStep, internalConnections.length); i++) {
                    const [s, e] = internalConnections[i];
                    if(pos[s] && pos[e]) {
                        ctx.moveTo(pos[s].x, pos[s].y);
                        ctx.lineTo(pos[e].x, pos[e].y);
                    }
                }
                ctx.stroke();
            }
            
            // Pontos durante animação
            pos.forEach(p => {
                ctx.beginPath();
                ctx.arc(p.x, p.y, 0.8, 0, 2 * Math.PI);
                ctx.fillStyle = '#00D1FF';
                ctx.fill();
            });
            
            upperContour.forEach(p => {
                ctx.beginPath();
                ctx.arc(p.x, p.y, 0.6, 0, 2 * Math.PI);
                ctx.fillStyle = '#00D1FF';
                ctx.fill();
            });
            
            ctx.restore();
            
            connectionBar.style.width = (progress * 100) + '%';
        }

        actionBtn.onclick = async () => {
            if (!currentDetection) return alert("⚠️ Nenhum rosto detectado! Posicione-se na frente da câmera.");
            
            scanning = true;
            actionBtn.disabled = true;
            laser.style.display = 'block';
            reticle.style.display = 'block';
            scanProgress.classList.add('active');
            
            const upperCount = 32;
            const totalAnimationSteps = 9 + upperCount + 9 + internalConnections.length;
            totalConnectionsSpan.textContent = totalAnimationSteps;
            
            isAnimatingConnections = true;
            for (currentConnectionIndex = 0; currentConnectionIndex < totalAnimationSteps; currentConnectionIndex++) {
                connectionCountSpan.textContent = currentConnectionIndex + 1;
                await new Promise(r => setTimeout(r, 6));
            }
            isAnimatingConnections = false;
            
            analysisStatus.classList.add('active');
            
            // Coleta múltiplas amostras para maior precisão
            shapeCounts = {};
            const amostras = [];
            for (let i = 0; i < 25; i++) {
                const proporcoes = analiseProporcoesCompletas(currentDetection.landmarks);
                const { formato } = diagnosticoFormatoRosto(proporcoes);
                amostras.push(formato);
                shapeCounts[formato] = (shapeCounts[formato] || 0) + 1;
                currentShapeSpan.textContent = formato;
                await new Promise(r => setTimeout(r, 60));
            }
            
            // Calcula o formato mais frequente
            faceShape = Object.keys(shapeCounts).reduce((a, b) => shapeCounts[a] > shapeCounts[b] ? a : b);
            
            // Análise final completa
            const proporcoes = analiseProporcoesCompletas(currentDetection.landmarks);
            const diagnostico = diagnosticoFormatoRosto(proporcoes);
            const entradaCapilar = analiseEntradaCapilar(currentDetection.landmarks);
            const classificacaoTestaResult = classificacaoTesta(proporcoes);
            const thirds = analyzeFaceThirdsFull(currentDetection.landmarks);
            
            // Calcula confiança baseada na consistência das amostras
            const maxCount = Math.max(...Object.values(shapeCounts));
            confidence = Math.min(99, 70 + Math.floor((maxCount / 25) * 30));
            
            // Prepara métricas para exibição
            metricas = {
                larguraRosto: proporcoes.larguraRosto.toFixed(1),
                alturaRosto: proporcoes.alturaRosto.toFixed(1),
                proporcao: proporcoes.proporcao.toFixed(3),
                larguraTesta: proporcoes.larguraTesta.toFixed(1),
                larguraMandibula: proporcoes.larguraMandibula.toFixed(1),
                distanciaOlhos: proporcoes.distanciaOlhos.toFixed(1),
                tercoSuperior: (proporcoes.proporcaoSuperior * 100).toFixed(1),
                tercoMedio: (proporcoes.proporcaoMedio * 100).toFixed(1),
                tercoInferior: (proporcoes.proporcaoInferior * 100).toFixed(1)
            };
            
            statusDiv.innerHTML = "✅ ANÁLISE COMPLETA CONCLUÍDA!";
            
            document.getElementById('formato-text').innerHTML = `
                🧬 <strong>Diagnóstico Facial:</strong> <span class="highlight">${faceShape}</span><br>
                <span style="font-size:0.7rem; color:#8899A6">📐 ${diagnostico.justificativa}</span><br><br>
                📉 <strong>Entrada capilar:</strong> <span class="highlight">${entradaCapilar}</span><br>
                📏 <strong>Testa:</strong> <span class="highlight">${classificacaoTestaResult}</span><br><br>
                ⚖️ <strong>Proporção dos 3 Terços Faciais:</strong><br>
                <span style="color: #9C27B0">●</span> Superior: <span class="highlight">${thirds.superior}</span> (${metricas.tercoSuperior}%)<br>
                <span style="color: #00D1FF">●</span> Médio: <span class="highlight">${thirds.medio}</span> (${metricas.tercoMedio}%)<br>
                <span style="color: #00FF88">●</span> Inferior: <span class="highlight">${thirds.inferior}</span> (${metricas.tercoInferior}%)
            `;
            
            document.getElementById('metricas-text').innerHTML = `
                📊 <strong>Métricas Antropométricas:</strong><br>
                └ Proporção Largura/Altura: <strong>${metricas.proporcao}</strong> (ref: 0.78-0.95 = Oval)<br>
                └ Relação Testa/Mandíbula: <strong>${(proporcoes.larguraTesta/proporcoes.larguraMandibula).toFixed(2)}</strong><br>
                └ Distância interocular: <strong>${metricas.distanciaOlhos}px</strong>
            `;
            
            document.getElementById('confianca-text').innerHTML = `🎯 Confiança do diagnóstico: ${confidence}% | Baseado em ${Object.keys(shapeCounts).length} variações faciais analisadas`;
            resultDisplay.style.display = 'block';
            laser.style.display = 'none';
            reticle.style.display = 'none';
            scanProgress.classList.remove('active');
            analysisStatus.classList.remove('active');
        };

        function analyzeFaceThirdsFull(landmarks) {
            const pos = landmarks.positions;
            const upperPoints = getUpperContourPoints(landmarks);
            const top = upperPoints[Math.floor(upperPoints.length/2)].y;
            const brow = (pos[19].y + pos[24].y) / 2;
            const nose = pos[33].y;
            const chin = pos[8].y;
            
            const t1 = brow - top;
            const t2 = nose - brow;
            const t3 = chin - nose;
            const avg = (t1 + t2 + t3) / 3;
            
            return {
                superior: t1 > avg * 1.08 ? "Desenvolvido" : t1 < avg * 0.92 ? "Reduzido" : "Proporcional",
                medio: t2 > avg * 1.08 ? "Desenvolvido" : t2 < avg * 0.92 ? "Reduzido" : "Proporcional",
                inferior: t3 > avg * 1.08 ? "Desenvolvido" : t3 < avg * 0.92 ? "Reduzido" : "Proporcional"
            };
        }

        function irParaAnalise() {
            window.location.href = `hairproduto.html?formato=${faceShape}&confianca=${confidence}`;
        }

        carregarModelos();
    </script>
